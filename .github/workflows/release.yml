name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # ── 1. Compute next semver ───────────────────────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semver
        id: semver
        run: |
          git fetch --tags
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$latest" ] && latest="v0.0.0"
          ver=${latest#v}
          IFS='.' read -r maj min pat <<< "$ver"
          case "${{ inputs.bump }}" in
            major) maj=$((maj+1)); min=0; pat=0 ;;
            minor) min=$((min+1)); pat=0 ;;
            patch) pat=$((pat+1)) ;;
          esac
          tag="v${maj}.${min}.${pat}"
          echo "Bumping $latest → $tag"
          echo "tag=$tag" >> $GITHUB_OUTPUT

  # ── 2. Desktop Builds (Windows / macOS / Linux) ─────────────────────────
  desktop:
    name: Desktop (${{ matrix.name }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact_name: bait-elezz-windows
            artifact_glob: release/**/*.exe
          - os: macos-latest
            name: mac
            artifact_name: bait-elezz-macos
            artifact_glob: release/**/*.dmg
          - os: ubuntu-latest
            name: linux
            artifact_name: bait-elezz-linux
            artifact_glob: release/**/*.{AppImage,deb}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject default Groq API key
        shell: bash
        run: |
          node -e "
            var fs = require('fs');
            var key = process.env.GROK_TOKEN || '';
            fs.writeFileSync('electron/default-key.ts', 'export const DEFAULT_GROQ_KEY = ' + JSON.stringify(key) + '\n');
          "
        env:
          GROK_TOKEN: ${{ secrets.GROK_API_TOKEN }}

      - name: Build Electron (TypeScript)
        run: npx tsc --project tsconfig.electron.json

      - name: Build Vite (React)
        run: npx vite build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.GROK_API_TOKEN }}

      - name: Package
        run: npx electron-builder --${{ matrix.name }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 1

  # ── 3. Android APK ──────────────────────────────────────────────────────
  android:
    name: Android APK
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (web assets)
        run: npx vite build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.GROK_API_TOKEN }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Set up release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
            printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$KEYSTORE_PASS" "$KEY_ALIAS" "$KEY_PASS" > android/app/keystore.properties
          fi

      - name: Build APK (release if signed, debug otherwise)
        working-directory: android
        run: |
          if [ -f app/keystore.properties ]; then
            ./gradlew assembleRelease --no-daemon
            echo "APK_PATH=app/build/outputs/apk/release/*.apk" >> $GITHUB_ENV
          else
            ./gradlew assembleDebug --no-daemon
            echo "APK_PATH=app/build/outputs/apk/debug/*.apk" >> $GITHUB_ENV
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bait-elezz-android
          path: android/${{ env.APK_PATH }}
          if-no-files-found: warn
          retention-days: 1

  # ── 4. Create GitHub Release ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [version, desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release ${{ needs.version.outputs.tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
